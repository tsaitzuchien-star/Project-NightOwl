<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中創園區 - 夜間電力盤查戰情室</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>⚡ 中創園區夜間電力盤查戰情室</h1>
        <div class="header-right">
            <button onclick="openSummaryModal()" class="task-btn" style="border-color:var(--accent-green); color:var(--accent-green); margin-right:10px;">📝 更新摘要</button>
            <button id="openFormBtn" class="report-btn">➕ 例行盤點回報</button>
        </div>
    </div>

    <div class="summary-section">
        <div class="total-power-card">
            <h2>夜間總基載</h2>
            <div class="big-number">132.0 <span>kW</span></div>
        </div>
        <div class="category-breakdown"><canvas id="doughnutChart"></canvas></div>
    </div>

    <div class="bottom-section">
        <div class="chart-card">
            <div class="chart-title"><span>🗣️ 戰情動態摘要 (手動發布版)</span></div>
            <div class="report-content" id="aiReportSummary">
                <ul><li>載入中...</li></ul>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">🎯 任務追蹤</div>
            <ul class="interactive-list">
                <li id="task_A棟1F大廳11.35kW組成釐清"><div class="task-info"><span class="checkbox-mark">[ ]</span> A 棟 1F：釐清 11.35kW 組成</div><button class="task-btn" onclick="openSimpleTaskModal('A棟1F大廳11.35kW組成釐清')">處理</button></li>
                <li id="task_美時製藥14.5kW關機可行性"><div class="task-info"><span class="checkbox-mark">[ ]</span> 美時製藥：14.5kW 關機確認</div><button class="task-btn" onclick="openSimpleTaskModal('美時製藥14.5kW關機可行性')">處理</button></li>
            </ul>
        </div>
    </div>

    <div id="fullReportModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeFullModal()">&times;</span>
            <h2>🔢 例行盤點數據回報</h2>
            <form id="fullAuditForm">
                <div class="form-group"><label>📍 區域</label><select id="f_area" required><option value="A棟 1F 西側">A棟 1F 西側</option><option value="B棟 3F">B棟 3F</option></select></div>
                <div class="form-row">
                    <div class="form-col"><label>❄️ 空調(kW)</label><input type="number" step="0.01" id="f_ac_kw"></div>
                    <div class="form-col"><label>💡 照明(kW)</label><input type="number" step="0.01" id="f_light_kw"></div>
                </div>
                <div class="form-group"><label>⚠️ 現場備註</label><textarea id="f_notes" rows="2"></textarea></div>
                <button type="submit" id="submitFullBtn" class="submit-btn">傳送數據 🚀</button>
            </form>
        </div>
    </div>

    <div id="summaryModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeSummaryModal()">&times;</span>
            <h2>✍️ 張貼分析摘要</h2>
            <p style="font-size:12px; color:var(--text-secondary); margin-bottom:10px;">請將 AI 分析好的內容貼在下方：</p>
            <textarea id="manual_summary_text" rows="12" placeholder="<li><strong>重點：</strong>內容...</li>" style="font-family:monospace; font-size:13px;"></textarea>
            <button onclick="submitManualSummary()" class="submit-btn">發布至戰情室 🚀</button>
        </div>
    </div>

    <div id="simpleTaskModal" class="modal">
        <div class="modal-content simple-modal">
            <span class="close-btn" onclick="closeSimpleModal()">&times;</span>
            <div id="simpleTaskBadge" class="task-badge"></div>
            <form id="simpleTaskForm">
                <textarea id="t_notes" rows="4" placeholder="處理結果..." required></textarea>
                <button type="submit" id="submitSimpleBtn" class="submit-btn">送出回報 ⚡</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
